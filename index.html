<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capability Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      padding: 20px 40px;
      border-bottom: 2px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.8rem;
      color: #38bdf8;
      letter-spacing: 1px;
    }

    header p {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    /* ── Breadcrumb ── */
    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 40px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-wrap: wrap;
    }

    .crumb {
      color: #38bdf8;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .crumb:hover {
      color: #7dd3fc;
      text-decoration: underline;
    }

    .crumb.active {
      color: #e2e8f0;
      cursor: default;
    }

    .crumb.active:hover {
      text-decoration: none;
    }

    .crumb-sep {
      color: #475569;
      font-size: 0.85rem;
    }

    /* ── Level Label ── */
    #level-label {
      text-align: center;
      padding: 28px 20px 10px;
    }

    #level-label h2 {
      font-size: 1.4rem;
      color: #7dd3fc;
      margin-bottom: 6px;
    }

    #level-label p {
      color: #64748b;
      font-size: 0.9rem;
    }

    /* ── Cards Grid ── */
    #cards-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 30px 40px;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 20px;
      width: 220px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent, #38bdf8);
      border-radius: 12px 12px 0 0;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent, #38bdf8);
      box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
    }

    .card-icon {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .card-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    /* ── Metric Detail Panel ── */
    #metric-panel {
      display: none;
      max-width: 700px;
      margin: 20px auto 40px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 36px;
    }

    #metric-panel h2 {
      font-size: 1.5rem;
      color: #38bdf8;
      margin-bottom: 6px;
    }

    #metric-panel .use-case-ref {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 24px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .metric-item {
      background: #0f172a;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #334155;
    }

    .metric-item label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      display: block;
      margin-bottom: 6px;
    }

    .metric-item span {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .metric-item.highlight span {
      color: #4ade80;
      font-size: 1.3rem;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      padding: 10px 20px;
      background: #334155;
      border: none;
      border-radius: 8px;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .back-btn:hover {
      background: #475569;
    }

    /* ── Use Case Detail Panel ── */
    #usecase-panel {
      display: none;
      max-width: 700px;
      margin: 20px auto 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px 36px 20px;
    }

    #usecase-panel h3 {
      font-size: 1.1rem;
      color: #7dd3fc;
      margin-bottom: 8px;
    }

    #usecase-panel p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.7;
    }

    /* ── Empty State ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }

    #empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      #cards-container { padding: 20px; gap: 14px; }
      .card { width: 160px; padding: 18px 14px; }
      #metric-panel, #usecase-panel { margin: 16px; padding: 24px 20px; }
      .metric-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  // ─────────────────────────────────────────────
  //  STATE
  // ─────────────────────────────────────────────
  let state = {
    level: "root",          // root | area | usecase | metric
    selectedArea: null,
    selectedUseCase: null,
    selectedMetric: null
  };

  // ─────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────
  const typeColors = {
    "KPI":        "#38bdf8",
    "Efficiency": "#4ade80",
    "Quality":    "#a78bfa",
    "Financial":  "#fbbf24"
  };

  function getTypeColor(type) {
    return typeColors[type] || "#94a3b8";
  }

  // ─────────────────────────────────────────────
  //  RENDER FUNCTIONS
  // ─────────────────────────────────────────────
  function renderBreadcrumb() {
    const bc = document.getElementById("breadcrumb");
    bc.innerHTML = "";

    const add = (label, level, clickable) => {
      const span = document.createElement("span");
      span.className = "crumb" + (clickable ? "" : " active");
      span.textContent = label;
      if (clickable) span.addEventListener("click", () => navigateTo(level));
      bc.appendChild(span);
    };

    const sep = () => {
      const s = document.createElement("span");
      s.className = "crumb-sep";
      s.textContent = "›";
      bc.appendChild(s);
    };

    add("Home", "root", state.level !== "root");

    if (state.selectedArea) {
      sep();
      add(state.selectedArea.title, "area", state.level !== "area");
    }
    if (state.selectedUseCase) {
      sep();
      add(state.selectedUseCase.title, "usecase", state.level !== "usecase");
    }
    if (state.selectedMetric) {
      sep();
      add(state.selectedMetric.title, "metric", false);
    }
  }

  function renderLevelLabel(title, subtitle) {
    document.getElementById("level-title").textContent = title;
    document.getElementById("level-subtitle").textContent = subtitle;
  }

  function renderCards(items, onClick) {
    const container = document.getElementById("cards-container");
    const empty = document.getElementById("empty-state");
    container.innerHTML = "";

    if (!items || items.length === 0) {
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.setProperty("--accent", item.color || "#38bdf8");

      card.innerHTML = `
        <div class="card-icon">${item.icon || "📌"}</div>
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.description || ""}</div>
        ${item.badge ? `<div class="card-badge">${item.badge}</div>` : ""}
      `;
      card.addEventListener("click", () => onClick(item));
      container.appendChild(card);
    });
  }

  function hideAllPanels() {
    document.getElementById("metric-panel").style.display = "none";
    document.getElementById("usecase-panel").style.display = "none";
  }

  // ─────────────────────────────────────────────
  //  NAVIGATION
  // ─────────────────────────────────────────────
  function navigateTo(level) {
    hideAllPanels();

    if (level === "root") {
      state = { level: "root", selectedArea: null, selectedUseCase: null, selectedMetric: null };
      showRoot();
    } else if (level === "area") {
      state.level = "area";
      state.selectedUseCase = null;
      state.selectedMetric = null;
      showArea(state.selectedArea);
    } else if (level === "usecase") {
      state.level = "usecase";
      state.selectedMetric = null;
      showUseCase(state.selectedUseCase, state.selectedArea);
    }
  }

  function showRoot() {
    renderBreadcrumb();
    renderLevelLabel("Business Areas", "Select a business area to explore its use cases");
    renderCards(capabilityData.businessAreas, (area) => {
      state.selectedArea = area;
      state.level = "area";
      hideAllPanels();
      showArea(area);
    });
  }

  function showArea(area) {
    renderBreadcrumb();
    renderLevelLabel(
      area.title + " — Use Cases",
      "Select a use case to view its description and metrics"
    );

    const useCaseCards = area.useCases.map(uc => ({
      ...uc,
      color: area.color,
      badge: uc.metrics.length + " metric" + (uc.metrics.length !== 1 ? "s" : "")
    }));

    renderCards(useCaseCards, (uc) => {
      state.selectedUseCase = uc;
      state.level = "usecase";
      hideAllPanels();
      showUseCase(uc, area);
    });
  }

  function showUseCase(uc, area) {
    renderBreadcrumb();
    renderLevelLabel(
      uc.title + " — Metrics",
      "Select a metric to view full details"
    );

    // Show use case description panel
    const ucPanel = document.getElementById("usecase-panel");
    ucPanel.style.display = "block";
    ucPanel.innerHTML = `
      <h3>📋 Use Case Description</h3>
      <p>${uc.description}</p>
    `;

    const metricCards = uc.metrics.map(m => ({
      ...m,
      color: getTypeColor(m.type),
      icon: getMetricIcon(m.type),
      description: `Owner: ${m.owner} · ${m.frequency}`,
      badge: m.type
    }));

    renderCards(metricCards, (metric) => {
      state.selectedMetric = metric;
      state.level = "metric";
      showMetric(metric, uc, area);
    });
  }

  function showMetric(metric, uc, area) {
    renderBreadcrumb();
    renderLevelLabel("", "");
    document.getElementById("level-label").style.display = "none";

    // Hide cards
    document.getElementById("cards-container").innerHTML = "";
    document.getElementById("usecase-panel").style.display = "none";

    const panel = document.getElementById("metric-panel");
    panel.style.display = "block";

    panel.innerHTML = `
      <h2>${getMetricIcon(metric.type)} ${metric.title}</h2>
      <div class="use-case-ref">
        ${area.icon} ${area.title} &nbsp;›&nbsp; ${uc.icon} ${uc.title}
      </div>

      <div class="metric-grid">
        <div class="metric-item highlight">
          <label>Current Value</label>
          <span>${metric.value}</span>
        </div>
        <div class="metric-item">
          <label>Target</label>
          <span>${metric.target}</span>
        </div>
        <div class="metric-item">
          <label>Metric Type</label>
          <span style="color:${getTypeColor(metric.type)}">${metric.type}</span>
        </div>
        <div class="metric-item">
          <label>Measurement Frequency</label>
          <span>${metric.frequency}</span>
        </div>
        <div class="metric-item">
          <label>Metric Owner</label>
          <span>${metric.owner}</span>
        </div>
        <div class="metric-item">
          <label>Business Area</label>
          <span>${area.title}</span>
        </div>
      </div>

      <button class="back-btn" onclick="navigateTo('usecase')">
        ← Back to Metrics
      </button>
    `;
  }

  function getMetricIcon(type) {
    const icons = {
      "KPI": "🎯",
      "Efficiency": "⚡",
      "Quality": "✨",
      "Financial": "💲"
    };
    return icons[type] || "📊";
  }

  // ─────────────────────────────────────────────
  //  INIT
  // ─────────────────────────────────────────────
  // Fix: show level-label when navigating back
  const origNavigateTo = navigateTo;
  window.navigateTo = function(level) {
    document.getElementById("level-label").style.display = "block";
    origNavigateTo(level);
  };

  showRoot();
</script>
</body>
</html>
